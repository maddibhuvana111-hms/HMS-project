<!DOCTYPE html>
<html>
<head>
    <title>Add House</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <script>
        function previewImage(event) {
            const reader = new FileReader();
            reader.onload = function(){
                const output = document.getElementById('preview');
                output.src = reader.result;
                output.style.display = "block";
            }
            reader.readAsDataURL(event.target.files[0]);
        }
    </script>

</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="card p-4 shadow">
        <h3 class="text-center mb-3">Add House</h3>

        <form method="POST" enctype="multipart/form-data">

            <input type="text" name="house_name" class="form-control mb-3" placeholder="House Name" required>

            <input type="text" name="location" class="form-control mb-3" placeholder="Location" required>

            <input type="file" name="image" class="form-control mb-3" onchange="previewImage(event)">

            <!-- IMAGE PREVIEW -->
            <img id="preview" src="#" style="display:none; width:100%; height:200px; object-fit:cover; margin-bottom:10px;">

            <button type="submit" class="btn btn-success w-100">Add House</button>

        </form>

        <a href="/dashboard" class="btn btn-secondary mt-3">Back</a>
    </div>

</div>

</body>
</html>
