<!DOCTYPE html>
<html>
<head>
    <title>Add House</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

    <style>
        body {
            background: #f4f6f9;
            font-family: Arial;
        }

        .container {
            width: 350px;
            margin: 80px auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px #ccc;
            text-align: center;
        }

        h2 {
            margin-bottom: 20px;
        }

        input {
            width: 90%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        button {
            background: green;
            color: white;
            padding: 10px;
            width: 100%;
            border: none;
            border-radius: 5px;
        }

        a {
            display: block;
            margin-top: 10px;
        }
    </style>
</head>

<body>

<div class="container">
    <h2>Add House</h2>

    <form method="POST" enctype="multipart/form-data">
        <input type="text" name="house_name" placeholder="House Name" required>
        <input type="text" name="location" placeholder="Location" required>
        <input type="file" name="image">

        <button type="submit">Add House</button>
    </form>

    <a href="/dashboard">⬅ Back to Dashboard</a>
</div>

</body>
</html>
