<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>

    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <script>
        function confirmDelete(id) {
            let result = confirm("Are you sure you want to delete this house?");
            if (result) {
                window.location.href = "/delete_house/" + id;
            }
        }
    </script>

</head>

<body class="bg-light">

<div class="container mt-4">

    
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h3>Welcome {{ session.get('user') }}</h3>
        <div>
            <a href="/add_house" class="btn btn-success">Add House</a>
            <a href="/logout" class="btn btn-danger">Logout</a>
        </div>
    </div>

    
    <form method="POST" class="mb-4">
        <div class="input-group">
            <input type="text" name="search" class="form-control" placeholder="Search houses...">
            <button class="btn btn-primary">Search</button>
        </div>
    </form>

    
    <div class="row">

        {% if houses %}
            {% for house in houses %}
            <div class="col-md-4">
                <div class="card mb-4 shadow-sm">

                    {% if house[4] %}
                    <img src="{{ url_for('static', filename='uploads/' + house[4]) }}"
                         class="card-img-top"
                         style="height:200px; object-fit:cover;">
                    {% endif %}

                    <div class="card-body text-center">
                    <h5>{{ house[2] }}</h5>
                    <p>{{ house[3] }}</p>

                    <a href="/edit_house/{{ house[0] }}" class="btn btn-primary btn-sm">
                    Edit
                    </a>

                    <button onclick="confirmDelete({{ house[0] }})"
                    class="btn btn-danger btn-sm">
                     Delete
                    </button>
                    </div>

                </div>
            </div>
            {% endfor %}
        {% else %}
            <p class="text-center text-muted">No houses found</p>
        {% endif %}

    </div>

</div>

</body>
</html>
