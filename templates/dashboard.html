<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>

    <style>
        body {
            font-family: Arial;
            background: #f4f6f8;
        }

        .header {
            background: #1976d2;
            color: white;
            padding: 15px;
            text-align: center;
        }

        .top-buttons {
            text-align: center;
            margin: 20px;
        }

        .btn {
            padding: 10px 20px;
            color: white;
            text-decoration: none;
            border-radius: 5px;
        }

        .btn-add { background: green; }
        .btn-logout { background: red; }

        .search-box {
            text-align: center;
            margin-bottom: 20px;
        }

        .container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
        }

        .card {
            background: white;
            width: 260px;
            margin: 15px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            text-align: center;
        }

        .card img {
            width: 100%;
            height: 150px;
        }
    </style>
</head>

<body>

<div class="header">
    <h2>Welcome {{ session['user'] }}</h2>
</div>

<div class="top-buttons">
    <a href="/add_house" class="btn btn-add">Add House</a>
    <a href="/logout" class="btn btn-logout">Logout</a>
</div>

<div class="search-box">
    <form method="POST">
        <input type="text" name="search" placeholder="Search..." style="padding:8px;">
        <button type="submit">Search</button>
    </form>
</div>

<div class="container">
    {% for house in houses %}
    <div class="card">

        {% if house['image'] %}
        <img src="{{ url_for('static', filename='uploads/' + house['image']) }}">
        {% endif %}

        <h3>{{ house['name'] }}</h3>
        <p>{{ house['location'] }}</p>

        <a href="/edit_house/{{ house['id'] }}">Edit</a>
        <a href="/delete_house/{{ house['id'] }}">Delete</a>

    </div>
    {% endfor %}
</div>

</body>
</html>
