<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #f5f7fa;
        }

        .card {
            border: none;
            border-radius: 15px;
            transition: 0.3s;
        }

        .card:hover {
            transform: scale(1.03);
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        .card img {
            height: 200px;
            object-fit: cover;
            border-top-left-radius: 15px;
            border-top-right-radius: 15px;
        }

        .btn {
            border-radius: 8px;
        }

        .top-bar {
            background: white;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .search-box input {
            border-radius: 10px;
        }
    </style>

    <script>
    function confirmDelete(id) {
        if (confirm("Are you sure you want to delete this house?")) {
            window.location.href = "/delete_house/" + id;
    }
}
</script>
</head>

<body>

<div class="container mt-4">

    
    <div class="top-bar d-flex justify-content-between align-items-center">
        <h4>Welcome {{ session['user'] }}</h4>

        <div>
            <a href="/add_house" class="btn btn-success me-2">+ Add House</a>
            <a href="/logout" class="btn btn-danger">Logout</a>
        </div>
    </div>

    
    <form method="POST" class="mb-4 search-box">
        <div class="input-group">
            <input type="text" name="search" class="form-control" placeholder="Search houses...">
            <button class="btn btn-primary">Search</button>
        </div>
    </form>

    
    <div class="row">

        {% if houses %}
            {% for house in houses %}
            <div class="col-md-4">

                <div class="card mb-4">

                    {% if house['image'] %}
                    <img src="{{ url_for('static', filename='uploads/' + house['image']) }}">
                    {% else %}
                    <img src="https://via.placeholder.com/400x200">
                    {% endif %}

                    <div class="card-body text-center">
                        <h5>{{ house['name'] }}</h5>
                        <p class="text-muted">{{ house['location'] }}</p>

                       <a href="/edit_house/{{ house['id'] }}" class="btn btn-primary btn-sm">
                         Edit
                        </a>

                <button onclick='confirmDelete('{{ house['id'] }}')'
                        class="btn btn-danger btn-sm">
                    Delete
                </button>
                    </div>

                </div>

            </div>
            {% endfor %}
        {% else %}
            <p class="text-center text-muted">No houses found</p>
        {% endif %}

    </div>

</div>

</body>
</html>
