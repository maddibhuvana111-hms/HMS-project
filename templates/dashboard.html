<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

    <h1 style="background:#1976d2; color:white; padding:15px; text-align:center;">
        Welcome {{ session['user'] }}
    </h1>

    <div style="text-align:center; margin:20px;">
        <a href="/add_house" style="background:green; color:white; padding:10px 20px; text-decoration:none; border-radius:5px;">Add House</a>

        <a href="/logout" style="background:red; color:white; padding:10px 20px; text-decoration:none; border-radius:5px; margin-left:10px;">Logout</a>
    </div>

    <div style="display:flex; flex-wrap:wrap; justify-content:center; gap:20px;">

        {% for house in houses %}
        <div style="background:#f5f5f5; padding:20px; border-radius:10px; width:250px; text-align:center; box-shadow:0 0 10px rgba(0,0,0,0.1);">

            <h3>{{ house['name'] }}</h3>

            <p><b>Location:</b> {{ house['location'] }}</p>

            {% if house['image'] %}
                <img src="{{ url_for('static', filename='uploads/' + house['image']) }}" width="200">
            {% else %}
                <p>No Image</p>
            {% endif %}

            <br><br>

            <a href="/edit_house/{{ house['id'] }}" 
               style="background:#1976d2; color:white; padding:5px 10px; text-decoration:none; border-radius:5px;">
               Edit
            </a>

            <a href="/delete_house/{{ house['id'] }}" 
               style="background:red; color:white; padding:5px 10px; text-decoration:none; border-radius:5px; margin-left:10px;">
               Delete
            </a>

        </div>
        {% endfor %}

    </div>

</body>
</html>
